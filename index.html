<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Legal Repository Browser</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
    --bg:#f4f6f8;
    --panel:#ffffff;
    --line:#d7dde4;
    --muted:#5f6b7a;
    --text:#18212b;
    --accent:#1f6feb;
    --hover:#eef4ff;
    --active:#dbeafe;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
    font-family:Segoe UI, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
}
.app{
    display:grid;
    grid-template-columns: 390px 1fr;
    grid-template-rows: auto 1fr;
    height:100vh;
}
.header{
    grid-column:1 / -1;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    padding:14px 18px;
}
.header h1{
    margin:0 0 6px 0;
    font-size:22px;
}
.header .meta{
    color:var(--muted);
    font-size:13px;
}
.sidebar{
    border-right:1px solid var(--line);
    background:var(--panel);
    overflow:auto;
    padding:14px;
}
.preview{
    overflow:auto;
    padding:18px;
}
.search{
    width:100%;
    padding:10px 12px;
    font-size:14px;
    border:1px solid var(--line);
    border-radius:8px;
    margin-bottom:12px;
}
.toolbar{
    display:flex;
    gap:8px;
    align-items:center;
    margin-bottom:10px;
    flex-wrap:wrap;
}
.toolbar button{
    border:1px solid var(--line);
    background:#fff;
    border-radius:8px;
    padding:7px 10px;
    cursor:pointer;
}
.toolbar button:hover{
    background:var(--hover);
}
.tree-root{
    font-size:14px;
}
details.folder{
    margin-left:0;
}
details.folder > summary{
    list-style:none;
    cursor:pointer;
    padding:6px 8px;
    border-radius:8px;
    display:flex;
    align-items:center;
    gap:8px;
    user-select:none;
}
details.folder > summary::-webkit-details-marker{
    display:none;
}
details.folder > summary:hover{
    background:var(--hover);
}
details.folder > summary .caret{
    width:12px;
    display:inline-block;
    color:var(--muted);
}
details.folder > summary .folder-name{
    font-weight:600;
}
details.folder > summary .folder-count{
    color:var(--muted);
    font-size:12px;
    margin-left:auto;
}
details.folder[open] > summary .caret::before{
    content:"▾";
}
details.folder:not([open]) > summary .caret::before{
    content:"▸";
}
.folder-children{
    margin-left:18px;
    padding-left:4px;
    border-left:1px dashed #e1e6eb;
}
.file-row{
    display:flex;
    align-items:center;
    gap:8px;
    padding:4px 0 4px 24px;
}
.file-btn{
    border:0;
    background:transparent;
    padding:6px 8px;
    border-radius:8px;
    cursor:pointer;
    text-align:left;
    color:var(--text);
    flex:1;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}
.file-btn:hover{
    background:var(--hover);
}
.file-btn.active{
    background:var(--active);
    font-weight:600;
}
.mini-link{
    font-size:12px;
    color:var(--accent);
    text-decoration:none;
}
.mini-link:hover{
    text-decoration:underline;
}
.empty{
    color:var(--muted);
    font-style:italic;
    padding:10px 6px;
}
.card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px;
    margin-bottom:16px;
}
.path{
    font-family:Consolas, monospace;
    font-size:13px;
    word-break:break-word;
    color:#334155;
}
.meta-grid{
    display:grid;
    grid-template-columns: 140px 1fr;
    gap:8px 12px;
    margin-top:12px;
    font-size:14px;
}
.meta-grid .label{
    color:var(--muted);
}
.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:14px;
}
.actions a, .actions button{
    border:1px solid var(--line);
    background:#fff;
    border-radius:8px;
    padding:8px 12px;
    text-decoration:none;
    color:var(--text);
    cursor:pointer;
    font-size:14px;
}
.actions a:hover, .actions button:hover{
    background:var(--hover);
}
.preview-box{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px;
}
.preview-box h3{
    margin:0 0 10px 0;
}
.preview-frame{
    width:100%;
    min-height:72vh;
    border:1px solid var(--line);
    border-radius:8px;
    background:#fff;
}
.preview-image{
    max-width:100%;
    height:auto;
    border:1px solid var(--line);
    border-radius:8px;
    display:block;
}
.preview-video{
    width:100%;
    max-height:72vh;
    border-radius:8px;
}
.preview-audio{
    width:100%;
}
.note{
    color:var(--muted);
    font-size:13px;
    margin-top:8px;
}
.badge{
    display:inline-block;
    font-size:12px;
    padding:3px 7px;
    border-radius:999px;
    background:#eef2f7;
    color:#334155;
    margin-left:8px;
}
@media (max-width: 980px){
    .app{
        grid-template-columns:1fr;
        grid-template-rows:auto 45vh 1fr;
    }
    .sidebar{
        border-right:0;
        border-bottom:1px solid var(--line);
    }
}
</style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>Legal Repository Browser</h1>
        <div class="meta">
            Static HTML index for Git repositories. Left side: collapsible tree. Right side: preview and file actions.
        </div>
    </div>

    <div class="sidebar">
        <input id="searchBox" class="search" type="text" placeholder="Filter folders or files...">
        <div class="toolbar">
            <button id="expandAllBtn" type="button">Expand all</button>
            <button id="collapseAllBtn" type="button">Collapse all</button>
            <button id="clearSearchBtn" type="button">Clear</button>
        </div>
        <div id="treeRoot" class="tree-root"></div>
    </div>

    <div class="preview" id="previewPane"></div>
</div>

const imageExts = new Set(["png","jpg","jpeg","gif","bmp","tif","tiff","webp","svg"]);
const pdfExts   = new Set(["pdf"]);
const videoExts = new Set(["mp4","webm","ogg","mov","m4v"]);
const audioExts = new Set(["mp3","wav","m4a","aac","flac","oga","ogg","wma"]);
const textExts  = new Set([
  "txt","md","markdown","csv","tsv","json","jsonl","xml","yml","yaml","ini","cfg","conf","log",
  "sql","html","htm","css","js","ts","jsx","tsx","py","ps1","psm1","psd1","bat","cmd","sh","zsh","bash",
  "java","cs","cpp","c","h","hpp","go","rb","php","rs","swift","kt","kts","tex","bib","rtf"
]);

let currentFilter = "";
let selectedPath = "";

function encodePath(path){
    return path.split("/").map(encodeURIComponent).join("/");
}

function escapeHtml(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
}

function formatSize(bytes){
    if (bytes === null || bytes === undefined || bytes === "") return "";
    const units = ["B","KB","MB","GB","TB"];
    let size = Number(bytes);
    let i = 0;
    while (size >= 1024 && i < units.length - 1){
        size /= 1024;
        i++;
    }
    return (i === 0 ? size.toFixed(0) : size.toFixed(2)) + " " + units[i];
}

function buildTree(entries){
    const root = {
        name: "Repository Root",
        path: "",
        folders: {},
        files: []
    };

    for (const entry of entries){
        const parts = entry.Path.split("/").filter(Boolean);
        let node = root;

        if (entry.Type === "folder"){
            for (const part of parts){
                if (!node.folders[part]){
                    node.folders[part] = {
                        name: part,
                        path: node.path ? node.path + "/" + part : part,
                        folders: {},
                        files: []
                    };
                }
                node = node.folders[part];
            }
        } else {
            const folderParts = parts.slice(0, -1);
            for (const part of folderParts){
                if (!node.folders[part]){
                    node.folders[part] = {
                        name: part,
                        path: node.path ? node.path + "/" + part : part,
                        folders: {},
                        files: []
                    };
                }
                node = node.folders[part];
            }
            node.files.push(entry);
        }
    }

    return root;
}

const treeData = buildTree(ENTRIES);

function fileMatches(file, q){
    if (!q) return true;
    const hay = (file.Name + " " + file.Path + " " + file.Ext).toLowerCase();
    return hay.includes(q);
}

function folderMatches(node, q){
    if (!q) return true;
    const own = (node.name + " " + node.path).toLowerCase();
    if (own.includes(q)) return true;
    if (node.files.some(f => fileMatches(f, q))) return true;
    return Object.values(node.folders).some(child => folderMatches(child, q));
}

function folderCounts(node){
    return {
        folders: Object.keys(node.folders).length,
        files: node.files.length
    };
}

function renderTree(){
    const rootEl = document.getElementById("treeRoot");
    rootEl.innerHTML = "";

    const topWrap = document.createElement("div");

    const rootInfo = document.createElement("div");
    rootInfo.className = "card";
    rootInfo.style.marginBottom = "12px";
    rootInfo.innerHTML = `
        <div style="font-weight:700; margin-bottom:6px;">Repository Root</div>
        <div class="path">.</div>
        <div class="note">Showing folders and files indexed from this repository.</div>
    `;
    topWrap.appendChild(rootInfo);

    const topFolders = Object.values(treeData.folders).sort((a,b) => a.name.localeCompare(b.name));
    const topFiles = [...treeData.files].sort((a,b) => a.Name.localeCompare(b.Name));

    if (topFolders.length === 0 && topFiles.length === 0){
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No items found.";
        topWrap.appendChild(empty);
    } else {
        for (const folder of topFolders){
            const node = renderFolder(folder, 0);
            if (node) topWrap.appendChild(node);
        }
        for (const file of topFiles){
            if (!fileMatches(file, currentFilter)) continue;
            topWrap.appendChild(renderFile(file));
        }
    }

    rootEl.appendChild(topWrap);
}

function renderFolder(node, depth){
    if (!folderMatches(node, currentFilter)) return null;

    const counts = folderCounts(node);
    const details = document.createElement("details");
    details.className = "folder";
    details.open = currentFilter ? true : depth < 2;

    const summary = document.createElement("summary");
    summary.innerHTML = `
        <span class="caret"></span>
        <span class="folder-name">📁 ${escapeHtml(node.name)}</span>
        <span class="folder-count">${counts.folders} folder(s), ${counts.files} file(s)</span>
    `;
    summary.addEventListener("click", () => {
        showFolder(node);
    });

    details.appendChild(summary);

    const children = document.createElement("div");
    children.className = "folder-children";

    const childFolders = Object.values(node.folders).sort((a,b) => a.name.localeCompare(b.name));
    const childFiles = [...node.files].sort((a,b) => a.Name.localeCompare(b.Name));

    for (const folder of childFolders){
        const childEl = renderFolder(folder, depth + 1);
        if (childEl) children.appendChild(childEl);
    }

    for (const file of childFiles){
        if (!fileMatches(file, currentFilter)) continue;
        children.appendChild(renderFile(file));
    }

    if (!children.children.length){
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No matching items.";
        children.appendChild(empty);
    }

    details.appendChild(children);
    return details;
}

function renderFile(file){
    const row = document.createElement("div");
    row.className = "file-row";

    const button = document.createElement("button");
    button.type = "button";
    button.className = "file-btn" + (selectedPath === file.Path ? " active" : "");
    button.textContent = "📄 " + file.Name;
    button.title = file.Path;
    button.addEventListener("click", () => {
        selectedPath = file.Path;
        showFile(file);
        renderTree();
    });

    const href = encodePath(file.Path);

    const open = document.createElement("a");
    open.href = href;
    open.target = "_blank";
    open.className = "mini-link";
    open.textContent = "Open";

    const download = document.createElement("a");
    download.href = href;
    download.className = "mini-link";
    download.setAttribute("download", "");
    download.textContent = "Download";

    row.appendChild(button);
    row.appendChild(open);
    row.appendChild(download);

    return row;
}

function showFolder(node){
    const counts = folderCounts(node);
    document.getElementById("previewPane").innerHTML = `
        <div class="card">
            <h2 style="margin-top:0;">📁 ${escapeHtml(node.name)}</h2>
            <div class="path">${escapeHtml(node.path || ".")}</div>
            <div class="meta-grid">
                <div class="label">Type</div><div>Folder</div>
                <div class="label">Immediate folders</div><div>${counts.folders}</div>
                <div class="label">Immediate files</div><div>${counts.files}</div>
            </div>
            <div class="note">Expand this folder on the left to browse its contents. Click a file to preview or download it.</div>
        </div>
    `;
}

function previewMarkup(file){
    const ext = (file.Ext || "").toLowerCase();
    const href = encodePath(file.Path);

    if (imageExts.has(ext)) {
        return `<img class="preview-image" src="${href}" alt="${escapeHtml(file.Name)}">`;
    }

    if (pdfExts.has(ext)) {
        return `<iframe class="preview-frame" src="${href}#view=FitH"></iframe>`;
    }

    if (videoExts.has(ext)) {
        return `<video class="preview-video" controls src="${href}"></video>`;
    }

    if (audioExts.has(ext)) {
        return `<audio class="preview-audio" controls src="${href}"></audio>`;
    }

    if (textExts.has(ext)) {
        return `<iframe class="preview-frame" src="${href}"></iframe>`;
    }

    return `
        <div class="note">
            No built-in inline preview for this file type in a plain local HTML page.
            Use <strong>Open</strong> or <strong>Download</strong>.
        </div>
    `;
}

function showFile(file){
    const href = encodePath(file.Path);

    document.getElementById("previewPane").innerHTML = `
        <div class="card">
            <h2 style="margin-top:0;">
                📄 ${escapeHtml(file.Name)}
                <span class="badge">${escapeHtml(file.Ext || "file")}</span>
            </h2>
            <div class="path">${escapeHtml(file.Path)}</div>

            <div class="meta-grid">
                <div class="label">Type</div><div>File</div>
                <div class="label">Size</div><div>${escapeHtml(formatSize(file.Size))}</div>
                <div class="label">Modified</div><div>${escapeHtml(file.Modified)}</div>
            </div>

            <div class="actions">
                <a href="${href}" target="_blank">Open file</a>
                <a href="${href}" download>Download file</a>
                <button type="button" id="copyPathBtn">Copy relative path</button>
            </div>
        </div>

        <div class="preview-box">
            <h3>Preview</h3>
            ${previewMarkup(file)}
            <div class="note">
                Best inline previews: PDF, images, text, HTML, audio, and video.
                Office files and specialty evidence formats usually need Open or Download.
            </div>
        </div>
    `;

    const copyBtn = document.getElementById("copyPathBtn");
    if (copyBtn) {
        copyBtn.addEventListener("click", async () => {
            try {
                await navigator.clipboard.writeText(file.Path);
                copyBtn.textContent = "Copied";
                setTimeout(() => copyBtn.textContent = "Copy relative path", 1200);
            } catch {
                copyBtn.textContent = "Copy failed";
                setTimeout(() => copyBtn.textContent = "Copy relative path", 1200);
            }
        });
    }
}

function expandAll(){
    document.querySelectorAll("details.folder").forEach(d => d.open = true);
}

function collapseAll(){
    document.querySelectorAll("details.folder").forEach(d => d.open = false);
}

document.getElementById("searchBox").addEventListener("input", e => {
    currentFilter = e.target.value.trim().toLowerCase();
    renderTree();
});

document.getElementById("expandAllBtn").addEventListener("click", expandAll);
document.getElementById("collapseAllBtn").addEventListener("click", collapseAll);
document.getElementById("clearSearchBtn").addEventListener("click", () => {
    currentFilter = "";
    document.getElementById("searchBox").value = "";
    renderTree();
});

renderTree();
showFolder({ name: "Repository Root", path: "", folders: treeData.folders, files: treeData.files });
</script>
